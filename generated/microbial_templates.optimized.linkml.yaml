slots:
  sample_name:
    description: A short, unique name for the sample.
    title: Sample Name
    slot_group: Sample ID
    range: string
  experimenter_name:
    description: Enter the name(s) of the experimenters primarily responsible for
      the sample. Note on Data Catalog, this will be recorded by whomever creates
      the experiment set.
    title: Experimenter Name
    slot_group: Experiment Set Details
    range: string
  lab:
    description: Indicate the lab were the experiment primarily resides. Vocabulary
      is controlled. Note on Data Catalog, this will be recorded based on whomever
      creates the experiment set.
    title: Lab
    slot_group: Experiment Set Details
    range: lab_enum
  experiment_set_name:
    description: Unique descriptive name of a set of samples to be analyzed together.
      Note on Data Catalog, this can be entered when the expeirment set is created.
    title: Experiment Set Name
    slot_group: Experiment Set Details
    range: string
  experiment_set_description:
    description: Description of the Experiment_Set; may include experimental design,
      rationale, etc. Write a description so someone in 5 years can understand why
      the experiment was performed.
    title: Experiment Set Description
    slot_group: Experiment Set Details
    range: string
  experiment_category:
    description: A term (or phrase) to describe the general experiment type. Vocabulary
      is controlled.
    title: Experiment Category
    slot_group: Experiment Set Details
    range: experiment_category_enum
  experiment_subcategory:
    description: A term (or phrase) to describe the experiment type more specifically.
      Free text. (e.g. gene over-expression, gene deletion, oxidative stress response)
    title: Experiment Subcategory
    slot_group: Experiment Set Details
    range: string
  collection_date:
    description: Date of collection. Format (Year/Month/Day)
    title: Date of collection / experiment
    slot_group: Sample Details
    range: string
  sample_description:
    description: Description of the biological sample.
    title: Sample Description
    slot_group: Sample Details
    range: string
  organism:
    description: The source organism of the biological sample. Vocabulary is controlled.
    title: Organism
    slot_group: Sample Details
    range: organism_enum
  strain_name:
    description: The name of the strain of the organism that is the source of the
      biological sample in a human readable format (e.g. E coli WT or E coli FNR deletion)
    title: Strain Name
    slot_group: Sample Details
    range: string
  strain_genotype:
    description: Strain genotype that reflects the history of the strain (e.g. K-12
      MG1655 delta-FNR)
    title: Strain Genotype
    slot_group: Sample Details
    range: string
  material_source:
    description: The lab in which the strain is primarily located to assist in finding
      the strain for future use. Vocabulary is controlled.
    title: Material Source
    slot_group: Sample Details
    range: strain_source_enum
  strain_library:
    description: The strain library used for the sample when using a strain library.
      Vocabulary is controlled.
    title: Strain Library
    slot_group: Sample Details
    range: strain_library_enum
  replicate_type:
    description: Indicate if the samples is a biological or technical replicate. Vocabulary
      is controlled.
    title: Replicate Type
    slot_group: Sample Details
    range: replicate_type_enum
  replicate_number:
    description: Indicate the number of the replicate sample. Number required.
    title: Replicate Number
    slot_group: Sample Details
    range: integer
  additional_replicate_information:
    description: Include any important information on the nature of the sample in
      terms of replication status (e.g. what makes it a techincal replicate)
    title: Additional Replicate Information
    slot_group: Sample Details
    range: string
  additional_experimental_details:
    description: Include any additional information on the experimental design that
      is important for understanding the experiment (e.g. concentration of added amino
      acids).
    title: Additional Experimental Details
    slot_group: Sample Details
    range: string
  starting_inoculum:
    description: Starting inoculum type for the culture. Vocabulary is controlled.
    title: Starting Inoculum
    slot_group: Culture Parameters
    range: starting_inoculum_enum
  other_starting_inoculum:
    description: Indicate other starting inoculum information needed to undertand
      the experiment.
    title: Other Starting Inoculum Information
    slot_group: Culture Parameters
    range: string
  length_of_growth_until_collection:
    description: Time or number of doublings of the culture. Please indicate units.
    title: Length of Growth Until Collection
    slot_group: Culture Parameters
    range: string
  growth_stage:
    description: The stage of growth for the culture when the sample was taken. Vocabulary
      is controlled.
    title: Growth Stage at Collection
    slot_group: Culture Parameters
    range: growth_stage_enum
  culture_density:
    description: Density of the culture at collection, in OD600, Klett units, or CFU/mL
    title: Culture Density at Collection
    slot_group: Culture Parameters
    range: string
  growth_medium:
    description: The base growth medium for the culture. Vocabulary is controlled.
    title: Base Growth Medium
    slot_group: Culture Parameters
    range: growth_medium_enum
  carbon_source:
    description: The carbon source present in the growth medium for the culture. Vocabulary
      is controlled.
    title: Carbon Source
    slot_group: Culture Parameters
    range: carbon_source_enum
  nitrogen_source:
    description: The nitrogen source present in the growth medium for the culture.
      Vocabulary is controlled.
    title: Nitrogen Source
    slot_group: Culture Parameters
    range: nitrogen_source_enum
  media_selection_drug:
    description: The drug added to the growth medium for selection. Select NONE if
      no drug is used. Vocabulary is controlled.
    title: Media Selection Drug
    slot_group: Culture Parameters
    range: media_selection_drug_enum
  drug_concentration:
    description: If drug used in growth medium, please give the concentration (mg/L
      or molarity)
    title: Media Drug Concentration
    slot_group: Culture Parameters
    range: string
  other_culture_additive:
    description: Any other information about the culture or growth media that is important
      to understand the sample and the experiment (e.g. other additives, other carbon
      sources, other nitrogen sources).
    title: Other culture additive and concetration
    slot_group: Culture Parameters
    range: string
  growth_temperature:
    description: Growth temperature used for the culture, in degrees C.
    title: Growth Temperature
    slot_group: Culture Parameters
    range: integer
  growth_method:
    description: Growth method used for the culture. Vocabulary is controlled.
    title: Growth Method
    slot_group: Culture Parameters
    range: growth_method_enum
  oxygen_availability:
    description: Oxygen availability for the culture during growth. Vocabulary is
      controlled.
    title: Oxygen Availability
    slot_group: Culture Parameters
    range: oxygen_availability_enum
  harvest_method:
    description: How was the culture sample was harvested (e.g. spin and flash freeze
      pellet in liquid nitrogen)
    title: Harvest Method
    slot_group: Culture Parameters
    range: string
  other_growth_information:
    description: Indicate any additional information related to growth or collection
      of culture (e.g. grown in front of light box)
    title: Other Growth Information
    slot_group: Culture Parameters
    range: string
  material_type_Bar:
    description: The material isolated and used for sequencing. Vocabulary is controlled.
    title: Material Type Bar
    slot_group: Library and Sequencing Details
    range: material_type_Bar_enum
  material_collected_by:
    description: The person who isolated the material used for sequencing.
    title: Material collected by
    slot_group: Library and Sequencing Details
    range: string
  material_source_protocol_id:
    description: Protocol used for isolation of the material. Reference an PDF uploaded
      to Data Catalog Expierment or Freely and Easily Available Online
    title: Material Source Protocol ID
    slot_group: Library and Sequencing Details
    range: string
  library_prep_protocol:
    description: Protocol used for preparing the sequencing libarary. Reference an
      PDF uploaded to Data Catalog Expierment or Freely and Easily Available Online
    title: Library Prep Protocol
    slot_group: Library and Sequencing Details
    range: string
  library_made_by:
    description: The person or sequencing center who prepared the sequencing library
    title: Library made by
    slot_group: Library and Sequencing Details
    range: string
  library_strandedness:
    description: The stradedness of the sequencing library. Vocabulary is controlled.
    title: Library Strandedness
    slot_group: Library and Sequencing Details
    range: library_strandedness_enum
  multiplex_adapter:
    description: Sequence of the (hexamer) multiplex adapter used for this library
      if multiplexing.
    title: Multiplex Adapter
    slot_group: Library and Sequencing Details
    range: string
  sequencing_center:
    description: The facility where the sequencing was perfomred. Vocabulary is controlled.
    title: Sequencing Center
    slot_group: Library and Sequencing Details
    range: sequencing_facility_enum
  sequencing_id:
    description: Sequencing facility ID for reference
    title: Sequencing ID
    slot_group: Library and Sequencing Details
    range: string
  run_id:
    description: Sequencing facility run ID for reference
    title: Run ID
    slot_group: Library and Sequencing Details
    range: string
  sequencing_platform:
    description: Instrument used to sequence the library. Vocabulary is controlled.
    title: Sequencing Platform
    slot_group: Library and Sequencing Details
    range: sequencing_platform_enum
  sequencing_run_type:
    description: Indicate if the sequencing is single end (1x) or paired end (2x)
      and the read length. Vocabulary is controlled.
    title: Sequencing Run Type
    slot_group: Library and Sequencing Details
    range: sequencing_run_type_enum
  other_library_information:
    description: Include any additional information on the construction of the library
      or sequencing parameters
    title: Other Library and Sequencing Information
    slot_group: Library and Sequencing Details
    range: string
  material_type_CRISPR:
    description: The material isolated and used for sequencing. Vocabulary is controlled.
    title: Material Type CRISPR
    slot_group: Library and Sequencing Details
    range: material_type_CRISPR_enum
  stock_number:
    description: The stock number of the strain (or culture or cultivar) of the organism
      that is the source of the biological sample (e.g. RL438 or APG4293). If no stock
      number available, please put NONE and update later.
    title: Stock Number
    slot_group: Sample Details
    range: string
  antibody_used:
    description: Indicate the antibody used for immunoprecipitation
    title: Antibody Used
    slot_group: Culture Parameters
    range: string
  antibody_source:
    description: Indicate the source of the antibody used. If purchased, indicate
      product number. If locally sourced, indicate relavant information (bleed number,
